# golangci-lint v2 — ALL linters enabled (default: all). The short disable list
# below covers only linters that are deprecated, mutually conflicting, or
# fundamentally at odds with this codebase's intentional choices; each has a
# one-line justification. Everything else is enforced.
version: "2"

linters:
  default: all
  disable:
    - exhaustruct   # requires every struct field set at every literal — impractical
    - varnamelen    # idiomatic short names (i, r, ctx, tt) are intentional
    - wsl           # whitespace pedantry, conflicts with gofmt-style blocks
    - wsl_v5        # same, newer variant
    - nlreturn      # mandatory blank line before every return — noise
    - mnd           # domain has many legitimate numeric literals (score ranges, weights, dims)
    - tagliatelle   # JSON tags are snake_case on purpose (API/LLM contract)
    - testpackage   # white-box tests need access to unexported helpers
    - err113        # we use a typed kernel.Error model, not sentinel errors
    - paralleltest  # tests are fast + deterministic; parallel adds flakiness for shared fixtures
    - noinlineerr   # flags idiomatic `if err := f(); err != nil` — conflicts with standard Go style
    - wrapcheck     # typed kernel.Error model classifies errors; over-wrapping hides the Kind

  settings:
    depguard:
      rules:
        domain:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: github.com/xcreativs/caliber/internal/app
              desc: "domain must not depend on application layer"
            - pkg: github.com/xcreativs/caliber/internal/adapters
              desc: "domain must not depend on adapters (ports & adapters rule)"
            - pkg: github.com/xcreativs/caliber/internal/platform
              desc: "domain must not depend on platform/infra"
        app:
          files:
            - "**/internal/app/**"
          deny:
            - pkg: github.com/xcreativs/caliber/internal/adapters
              desc: "use-cases depend on domain ports, not concrete adapters"
    exhaustive:
      default-signifies-exhaustive: true
    lll:
      line-length: 140
    goconst:
      min-occurrences: 4

  exclusions:
    generated: lax
    rules:
      - path: 'internal/gen/'
        linters: [depguard]
      - path: '_test\.go'
        linters: [funlen, gocyclo, gocognit, cyclop, dupl, gosec, errcheck, maintidx, lll, nilnil]
