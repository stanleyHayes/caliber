# Local dev stack: Postgres+pgvector, Redis, and the api/worker services.
# Usage: docker compose up --build
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: caliber
      POSTGRES_PASSWORD: caliber
      POSTGRES_DB: caliber
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caliber -d caliber"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      CALIBER_ENV: dev
      CALIBER_HTTP_ADDR: ":8080"
      CALIBER_GRPC_ADDR: ":9090"
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
      CALIBER_REDIS_URL: redis://redis:6379/0
      CALIBER_JWT_SECRET: dev-secret-change-me
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      CALIBER_ENV: dev
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
      CALIBER_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
