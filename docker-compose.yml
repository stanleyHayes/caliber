# Local dev stack: Postgres+pgvector, Redis, migrations, API, worker, Vite,
# Prometheus, Loki, and Grafana.
# Usage: docker compose up --build
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: caliber
      POSTGRES_PASSWORD: caliber
      POSTGRES_DB: caliber
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caliber -d caliber"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile.migrate
    environment:
      CALIBER_ENV: dev
      CALIBER_LOG_LEVEL: info
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      CALIBER_ENV: dev
      CALIBER_HTTP_ADDR: ":8080"
      CALIBER_GRPC_ADDR: ":9090"
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
      CALIBER_REDIS_URL: redis://redis:6379/0
      CALIBER_JWT_SECRET: dev-secret-change-me
      CALIBER_LOKI_URL: http://loki:3100
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      CALIBER_ENV: dev
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
      CALIBER_REDIS_URL: redis://redis:6379/0
      CALIBER_LOKI_URL: http://loki:3100
      CALIBER_WORKER_METRICS_ADDR: ":8081"
    ports:
      - "8081:8081"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROXY_TARGET: http://api:8080
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  web_node_modules:
