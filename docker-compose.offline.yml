# Self-contained offline/standby demo stack (CAL-107).
#
# Runs the full Caliber POC without external network dependencies:
#   - Postgres + pgvector on localhost:5432
#   - Redis on localhost:6379
#   - API (gRPC + REST) on localhost:8080 / 9090
#   - Background worker
#   - Static React UI on http://localhost:5173
#
# All AI calls use the deterministic dev LLM/embedder (no Anthropic/OpenAI keys).
# Build the images ahead of time on a network-connected machine:
#     make offline-build
# Then run at the venue with no external network:
#     make offline-demo
#
# The web image is a self-contained nginx container serving the built SPA;
# it proxies /v1/* to the API so the UI works same-origin without VITE_API_URL.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: caliber
      POSTGRES_PASSWORD: caliber
      POSTGRES_DB: caliber
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caliber -d caliber"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile.migrate
    environment:
      CALIBER_ENV: dev
      CALIBER_LOG_LEVEL: info
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      CALIBER_ENV: dev
      CALIBER_LOG_LEVEL: info
      CALIBER_HTTP_ADDR: ":8080"
      CALIBER_GRPC_ADDR: ":9090"
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
      CALIBER_REDIS_URL: redis://redis:6379/0
      CALIBER_JWT_SECRET: offline-demo-secret
      CALIBER_SEED_DEMO: "true"
      CALIBER_SEED_GENERATED: "false"
      CALIBER_INTERVIEW_MAX_QUESTIONS: "4"
      CALIBER_DASHBOARD_CACHE_TTL: "30s"
      # Deliberately empty: dev LLM/embedder providers are selected when these are unset.
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      CALIBER_ENV: dev
      CALIBER_DATABASE_URL: postgres://caliber:caliber@postgres:5432/caliber?sslmode=disable
      CALIBER_REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
