name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint · proto · test · coverage · sonar)
    runs-on: ubuntu-latest
    env:
      # Allow `go install <tool>@latest` to fetch a newer Go toolchain on demand
      # when a tool (e.g. buf) requires one beyond the version pinned in go.mod.
      GOTOOLCHAIN: auto
    steps:
      # All actions pinned to latest majors (Node 24 runtime; no Node 20).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf + codegen plugins
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: buf lint
        run: buf lint

      - name: Verify generated code is up to date
        run: |
          buf generate
          git diff --exit-code -- internal/gen \
            || { echo "::error::internal/gen is stale — run 'make proto' and commit"; exit 1; }
          sqlc generate
          git diff --exit-code -- internal/adapters/outbound/postgres/sqlcdb \
            || { echo "::error::sqlcdb is stale — run 'make sqlc' and commit"; exit 1; }

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: go vet
        run: go vet ./...

      - name: Test with race + coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage >= 80% (app code)
        run: |
          grep -vE 'internal/gen/|internal/mocks/|internal/platform/migrate/|internal/adapters/outbound/postgres/|/cmd/' coverage.out > coverage.app.out
          total=$(go tool cover -func=coverage.app.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "App coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 80) ? 0 : 1 }' \
            || { echo "::error::coverage ${total}% is below the 80% gate"; exit 1; }

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
