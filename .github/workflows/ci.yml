name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Refresh vulnerability intelligence weekly even when no code changes land.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend (lint · proto · test · coverage · sonar)
    runs-on: ubuntu-latest
    steps:
      # All actions pinned to latest majors (Node 24 runtime; no Node 20).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf + codegen plugins
        env:
          # Step-level GOTOOLCHAIN beats setup-go's GITHUB_ENV value, so
          # `go install <tool>@latest` fetches whatever Go a tool needs (sqlc
          # now wants 1.26+, buf 1.25.10) regardless of the go.mod-pinned Go.
          GOTOOLCHAIN: auto
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: buf lint
        run: buf lint

      - name: Verify generated code is up to date
        run: |
          buf generate
          git diff --exit-code -- internal/gen \
            || { echo "::error::internal/gen is stale — run 'make proto' and commit"; exit 1; }
          sqlc generate
          git diff --exit-code -- internal/adapters/outbound/postgres/sqlcdb \
            || { echo "::error::sqlcdb is stale — run 'make sqlc' and commit"; exit 1; }

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: go vet
        run: go vet ./...

      - name: Test with race + coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage >= 80% (app code)
        run: |
          grep -vE 'node_modules|internal/gen/|internal/mocks/|internal/platform/migrate/|internal/adapters/outbound/postgres/|/cmd/|/web/' coverage.out > coverage.app.out
          total=$(go tool cover -func=coverage.app.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "App coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 80) ? 0 : 1 }' \
            || { echo "::error::coverage ${total}% is below the 80% gate"; exit 1; }

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend:
    name: Frontend (typecheck · build · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build # tsc --noEmit && vite build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run # vitest run (jsdom)

  lighthouse:
    name: Lighthouse CI (performance budgets)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci

  supply-chain:
    name: Supply chain (govulncheck · npm audit · Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: npm audit blocks high/critical vulnerabilities
        working-directory: web
        run: npm audit --audit-level=high

      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t "caliber-api:${{ github.sha }}" .

      - name: Trivy scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caliber-api:${{ github.sha }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: Build worker image
        run: docker build -f deploy/Dockerfile.worker -t "caliber-worker:${{ github.sha }}" .

      - name: Trivy scan worker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caliber-worker:${{ github.sha }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: Build migrate image
        run: docker build -f deploy/Dockerfile.migrate -t "caliber-migrate:${{ github.sha }}" .

      - name: Trivy scan migrate image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caliber-migrate:${{ github.sha }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
