name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint · proto · test · coverage · sonar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install codegen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: buf lint
        run: buf lint

      - name: Verify generated code is up to date
        run: |
          buf generate
          git diff --exit-code -- internal/gen \
            || { echo "::error::internal/gen is stale — run 'make proto' and commit"; exit 1; }

      - name: golangci-lint (enforces hexagonal boundaries)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: go vet
        run: go vet ./...

      - name: Test with race + coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage >= 80%
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 80) ? 0 : 1 }' \
            || { echo "::error::coverage ${total}% is below the 80% gate"; exit 1; }

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
