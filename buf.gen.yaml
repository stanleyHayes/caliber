# Codegen config (buf v2). Local plugins (install with `make tools`), latest stable.
# Generates Go structs, gRPC, grpc-gateway (REST) into internal/gen, OpenAPI into docs/openapi.
version: v2
managed:
  enabled: true
  disable:
    # Keep googleapis' own go_package (google.golang.org/genproto/...); don't rewrite it.
    - file_option: go_package
      module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/xcreativs/caliber/internal/gen
plugins:
  - local: protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: internal/gen
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: internal/gen
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  - local: protoc-gen-openapiv2
    out: docs/openapi
    opt:
      - allow_merge=true
      - merge_file_name=caliber
