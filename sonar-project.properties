sonar.projectKey=xcreativs_caliber
sonar.projectName=Project Caliber
sonar.organization=xcreativs

# Sources / tests
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.exclusions=internal/gen/**,internal/mocks/**,docs/openapi/**,**/*.pb.go,**/*.pb.gw.go

# Go coverage (produced by `go test -coverprofile=coverage.out`)
sonar.go.coverage.reportPaths=coverage.out
sonar.coverage.exclusions=internal/gen/**,internal/mocks/**,internal/platform/migrate/**,internal/adapters/outbound/postgres/sqlcdb/**,cmd/**,**/*_test.go

# Quality gate is configured in SonarCloud; CI fails the build if it fails.
