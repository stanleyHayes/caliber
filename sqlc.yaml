version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/adapters/outbound/postgres/sqlcdb"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "vector"
            go_type: "string"
